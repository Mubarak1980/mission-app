<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <!-- FIXED: single correct viewport meta -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

    <title>Mission App</title>

    <link rel="stylesheet" href="./styles.css" />
    <link rel="manifest" href="/manifest.json" />

    <!-- PWA CORE -->
    <meta name="theme-color" content="#00d4ff" />
    <meta name="application-name" content="Mission App">

    <!-- Mobile App Mode -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mission App">

    <!-- ICON -->
    <link rel="icon" href="/icon-192.png">
    <link rel="apple-touch-icon" href="/icon-192.png">

    <meta name="format-detection" content="telephone=no">
</head>

<body>

<!-- ===================== -->
<!-- SPLASH SCREEN -->
<!-- ===================== -->
<div id="splash-screen">
    <div class="splash-content">
        <h1>📘 Mission App</h1>
        <p>Loading...</p>
        <div class="loader"></div>
    </div>
</div>

<!-- ===================== -->
<!-- APP -->
<!-- ===================== -->
<div id="app" style="display:none;">
    <h1>MISSION APP</h1>

    <div class="section-buttons">
        <button onclick="loadSection('study', currentGrade)">Study Tracker</button>
        <button onclick="loadSection('timetable')">Weekly Timetable</button>
        <button onclick="loadSection('dashboard')">Dashboard</button>
        <button onclick="loadSection('top-student')">Top Student Mode</button>
        <button onclick="loadSection('sunnah')">Sunnah Tracker</button>
    </div>

    <div id="grade-progress-bar"></div>
    <div id="main-content"></div>

    <div id="grade-nav">
        <button onclick="previousGrade()" id="prev-btn">Previous</button>
        <button onclick="nextGrade()" id="next-btn">Next</button>
    </div>
</div>

<!-- ===================== -->
<!-- JS (SAFE ORDER) -->
<!-- ===================== -->
<script src="./main.js" defer></script>
<script src="./Study-tracker.js" defer></script>
<script src="./Sunnah-tracker.js" defer></script>
<script src="./weekly-timetable.js" defer></script>
<script src="./dashboard.js" defer></script>
<script src="./top-student-mode.js" defer></script>

<!-- ===================== -->
<!-- PWA SERVICE WORKER -->
<!-- ===================== -->
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
        try {
            const reg = await navigator.serviceWorker.register('/service-worker.js');

            console.log('SW registered:', reg.scope);

            // force update check
            reg.update();

            // NEW VERSION HANDLING (important for "native app feel")
            reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;

                if (!newWorker) return;

                newWorker.addEventListener('statechange', () => {
                    if (
                        newWorker.state === 'installed' &&
                        navigator.serviceWorker.controller
                    ) {
                        console.log("Update ready — refresh app");
                    }
                });
            });

            // allow SW to activate immediately when updated
            if (reg.waiting) {
                reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            }

        } catch (err) {
            console.error('SW ERROR:', err);
        }
    });
}

// =====================
// SPLASH CONTROL (SAFE)
// =====================
window.addEventListener('load', () => {
    const splash = document.getElementById('splash-screen');
    const app = document.getElementById('app');

    setTimeout(() => {
        if (splash) splash.classList.add('hide');

        setTimeout(() => {
            splash?.remove();
            if (app) app.style.display = 'block';
        }, 450);

    }, 900);
});
</script>

</body>
</html>
