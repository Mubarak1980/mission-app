<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <!-- Mobile viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <title>Mission App</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/styles.css" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#00d4ff" />

    <!-- Mobile App -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mission App" />

    <!-- Icons -->
    <link rel="icon" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
</head>

<body>

<!-- ===============================
🌄 SPLASH SCREEN
=============================== -->
<div id="splash-screen">
    <div class="splash-content">
        <h1>📘 Mission App</h1>
        <p>Loading your study system...</p>
        <div class="loader"></div>
    </div>
</div>

<!-- ===============================
🚀 MAIN APP
=============================== -->
<div id="app" style="visibility: hidden;">

    <h1>TIME</h1>

    <!-- SECTION BUTTONS -->
    <div class="section-buttons">
        <button onclick="loadSunnahTracker()">Sunnah Tracker</button>
        <button onclick="loadSection('study', currentGrade)">Study Tracker</button>
        <button onclick="loadSection('timetable', currentGrade)">📅 Weekly Timetable</button>
        <button onclick="loadDashboard()">📊 Dashboard</button>
        <button onclick="loadTopStudentMode()">🎓 Top Student Mode</button>
    </div>

    <!-- PROGRESS -->
    <div id="grade-progress-bar"></div>

    <!-- MAIN CONTENT -->
    <div id="main-content"></div>

    <!-- ===============================
    🔥 NAVIGATION BUTTONS (MATCHED CSS)
    =============================== -->
    <div id="grade-nav">
        <button id="prev-btn" onclick="previousGrade()">⬅ Previous</button>
        <button id="next-btn" onclick="nextGrade()">Next ➡</button>
    </div>

</div>

<!-- ===============================
JS FILES
=============================== -->
<script src="/Sunnah-tracker.js"></script>
<script src="/Study-tracker.js"></script>
<script src="/weekly-timetable.js"></script>
<script src="/dashboard.js"></script>
<script src="/top-student-mode.js"></script>
<script src="/main.js"></script>

<!-- ===============================
SERVICE WORKER
=============================== -->
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
            .then(reg => console.log('Service Worker Registered:', reg.scope))
            .catch(err => console.log('Service Worker Error:', err));
    });
}
</script>

<!-- ===============================
INSTALL HANDLER
=============================== -->
<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
});

async function installApp() {
    if (!deferredPrompt) {
        alert("App cannot be installed yet. Try refreshing.");
        return;
    }

    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
}
</script>

<!-- ===============================
SPLASH CONTROLLER
=============================== -->
<script>
window.addEventListener('load', () => {
    const splash = document.getElementById('splash-screen');
    const app = document.getElementById('app');

    setTimeout(() => {
        splash.classList.add('hide');

        setTimeout(() => {
            splash.remove();
            app.style.visibility = 'visible';
        }, 500);
    }, 1000);
});
</script>

</body>
</html>
