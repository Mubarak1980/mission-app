<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <title>Mission App</title>

    <!-- ✅ FIX: prevent white flash before PWA loads -->
    <style>
        html, body {
            margin: 0;
            background: #0b0f14;
        }

        #app {
            opacity: 1;
            transition: opacity 0.15s ease;
        }
    </style>

    <link rel="stylesheet" href="./styles.css" />

    <!-- MANIFEST -->
    <link rel="manifest" href="./manifest.json">

    <meta name="theme-color" content="#00d4ff" />
    <meta name="application-name" content="Mission App" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mission App" />

    <link rel="icon" href="./icon-192.png" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
</head>

<body>

<!-- SPLASH -->
<div id="splash-screen">
    <div class="splash-content">
        <h1>📘 Mission App</h1>
        <p>Loading...</p>
        <div class="loader"></div>
    </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
    <h1>TIME</h1>

    <div class="section-buttons">
        <button onclick="loadSection('study', currentGrade)">Study Tracker</button>
        <button onclick="loadSection('timetable')">Weekly Timetable</button>
        <button onclick="loadSection('dashboard')">Dashboard</button>
        <button onclick="loadSection('top-student')">Top Student Mode</button>
        <button onclick="loadSection('sunnah')">Sunnah Tracker</button>
    </div>

    <div id="grade-progress-bar"></div>
    <div id="main-content"></div>

    <div id="grade-nav">
        <button onclick="previousGrade()" id="prev-btn">Previous</button>
        <button onclick="nextGrade()" id="next-btn">Next</button>
    </div>
</div>

<!-- JS FILES -->
<script src="./Sunnah-tracker.js"></script>
<script src="./Study-tracker.js"></script>
<script src="./weekly-timetable.js"></script>
<script src="./dashboard.js"></script>
<script src="./top-student-mode.js"></script>
<script src="./main.js"></script>

<!-- PWA SCRIPT -->
<script>
let deferredPrompt = null;
const installBtn = document.getElementById("installBtn");

/* INSTALL PROMPT */
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;

    console.log("Install available");

    if (installBtn) installBtn.style.display = "block";
});

/* INSTALL CLICK */
installBtn?.addEventListener("click", async () => {
    if (!deferredPrompt) return;

    deferredPrompt.prompt();
    const choice = await deferredPrompt.userChoice;

    if (choice.outcome === "accepted") {
        console.log("Installed");
    }

    deferredPrompt = null;
    installBtn.style.display = "none";
});

/* SERVICE WORKER */
if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
        try {
            const reg = await navigator.serviceWorker.register('./service-worker.js');

            console.log('SW registered:', reg.scope);

            reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;

                newWorker?.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        console.log('Update available');
                    }
                });
            });

        } catch (err) {
            console.error('SW ERROR:', err);
        }
    });
}

/* SPLASH (FIXED FAST BOOT - NO ICON DELAY FEELING) */
window.addEventListener('DOMContentLoaded', () => {
    const splash = document.getElementById('splash-screen');
    const app = document.getElementById('app');

    // Show app immediately behind splash
    if (app) {
        app.style.display = 'block';
        app.style.opacity = '0';
    }

    requestAnimationFrame(() => {
        if (app) app.style.opacity = '1';

        setTimeout(() => {
            if (splash) {
                splash.style.transition = "opacity 0.15s ease";
                splash.style.opacity = "0";
            }

            setTimeout(() => {
                splash?.remove();
            }, 150);
        }, 120);
    });
});
</script>

</body>
    </html>
