<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Mission App</title>

    <!-- PWA -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#00ffa6" />

    <!-- iOS FULL SCREEN -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="apple-touch-icon" href="./icon-192.png">

    <link rel="stylesheet" href="./styles.css" />
</head>

<body>

<!-- ================= APP SHELL ================= -->
<div id="app-shell">

    <!-- SPLASH (native-style) -->
    <div id="splash">
        <div class="logo">📘 Mission App</div>
        <div class="loader"></div>
    </div>

    <!-- MAIN APP -->
    <div id="app" class="hidden">

        <h1>TIME</h1>

        <div class="section-buttons">
            <button onclick="loadSunnahTracker()">Sunnah Tracker</button>
            <button onclick="loadSection('study', currentGrade)">Study Tracker</button>
            <button onclick="loadSection('timetable', currentGrade)">📅 Weekly Timetable</button>
            <button onclick="loadDashboard()">📊 Dashboard</button>
            <button onclick="loadTopStudentMode()">🎓 Top Student Mode</button>
        </div>

        <div id="grade-progress-bar"></div>
        <div id="main-content"></div>

        <div class="nav-buttons">
            <button onclick="previousGrade()">Previous</button>
            <button onclick="nextGrade()">Next</button>
        </div>

    </div>
</div>

<!-- JS -->
<script src="./Sunnah-tracker.js"></script>
<script src="./Study-tracker.js"></script>
<script src="./weekly-timetable.js"></script>
<script src="./dashboard.js"></script>
<script src="./top-student-mode.js"></script>
<script src="./main.js"></script>

<!-- ================= SERVICE WORKER ================= -->
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
        await navigator.serviceWorker.register('./service-worker.js');
    });
}
</script>

<!-- ================= NATIVE START ENGINE ================= -->
<script>
window.addEventListener('load', () => {

    const splash = document.getElementById('splash');
    const app = document.getElementById('app');

    // fast native transition
    requestAnimationFrame(() => {
        setTimeout(() => {
            splash.style.opacity = "0";

            setTimeout(() => {
                splash.remove();
                app.classList.remove('hidden');
            }, 250);

        }, 400);
    });

});
</script>

</body>
</html>
