<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mission App</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./styles.css" />

    <!-- PWA -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#2d89ef" />

    <!-- Icons -->
    <link rel="apple-touch-icon" href="./icon-192.png">
</head>

<body>
    <h1>TIME</h1>

    <!-- SECTION BUTTONS -->
    <div class="section-buttons">
        <button onclick="loadSunnahTracker()">Sunnah Tracker</button>
        <button onclick="loadSection('study', currentGrade)">Study Tracker</button>
        <button onclick="loadWeeklyTimetable()">📅 Weekly Timetable</button>
        <button onclick="loadDashboard()">📊 Dashboard</button>
        <button onclick="loadTopStudentMode()">🎓 Top Student Mode</button>
    </div>

    <!-- PROGRESS -->
    <div id="grade-progress-bar"></div>

    <!-- MAIN CONTENT -->
    <div id="main-content"></div>

    <!-- NAVIGATION -->
    <div class="nav-buttons" id="grade-nav">
        <button onclick="previousGrade()" id="prev-btn">Previous</button>
        <button onclick="nextGrade()" id="next-btn">Next</button>
    </div>

    <!-- =========================
         JS FILES (IMPORTANT ORDER)
    ========================== -->
    <script src="./Sunnah-tracker.js"></script>
    <script src="./Study-tracker.js"></script>
    <script src="./weekly-timetable.js"></script>
    <script src="./dashboard.js"></script>
    <script src="./top-student-mode.js"></script>
    <script src="./main.js"></script>

    <!-- =========================
         SERVICE WORKER (FIXED)
    ========================== -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => {
                        console.log('SW registered:', reg.scope);
                    })
                    .catch(err => {
                        console.log('SW failed:', err);
                    });
            });
        }
    </script>

</body>
</html>
