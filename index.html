<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <!-- VIEWPORT (FIXED for real native feel) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Mission App</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./styles.css" />

    <!-- MANIFEST -->
    <link rel="manifest" href="./manifest.json" />

    <!-- THEME -->
    <meta name="theme-color" content="#00d4ff" />
    <meta name="application-name" content="Mission App">

    <!-- PWA FLAGS -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mission App">

    <!-- ICONS -->
    <link rel="icon" href="./icon-192.png">
    <link rel="apple-touch-icon" href="./icon-192.png">

    <!-- PRELOAD (PERFORMANCE BOOST) -->
    <link rel="preload" href="./main.js" as="script">
</head>

<body>

<!-- SPLASH SCREEN -->
<div id="splash-screen">
    <div class="splash-content">
        <h1>📘 Mission App</h1>
        <p>Loading...</p>
        <div class="loader"></div>
    </div>
</div>

<!-- APP -->
<div id="app" style="visibility:hidden;">
    <h1>TIME</h1>

    <div class="section-buttons">
        <button onclick="loadSunnahTracker()">Sunnah Tracker</button>
        <button onclick="loadSection('study', currentGrade)">Study Tracker</button>
        <button onclick="loadSection('timetable', currentGrade)">Weekly Timetable</button>
        <button onclick="loadSection('dashboard', currentGrade)">Dashboard</button>
        <button onclick="loadTopStudentMode()">Top Student Mode</button>
    </div>

    <div id="grade-progress-bar"></div>
    <div id="main-content"></div>

    <div id="grade-nav">
        <button onclick="previousGrade()" id="prev-btn">Previous</button>
        <button onclick="nextGrade()" id="next-btn">Next</button>
    </div>
</div>

<!-- JS FILES (DEFER = faster load, no blocking) -->
<script src="./Sunnah-tracker.js" defer></script>
<script src="./Study-tracker.js" defer></script>
<script src="./weekly-timetable.js" defer></script>
<script src="./dashboard.js" defer></script>
<script src="./top-student-mode.js" defer></script>
<script src="./main.js" defer></script>

<!-- ===============================
SERVICE WORKER (PROFESSIONAL VERSION)
=============================== -->
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
        try {
            const reg = await navigator.serviceWorker.register('./service-worker.js');

            console.log('SW registered:', reg.scope);

            // Controlled update flow (NO bugs)
            if (reg.waiting) {
                reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            }

            reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;

                if (!newWorker) return;

                newWorker.addEventListener('statechange', () => {
                    if (
                        newWorker.state === 'installed' &&
                        navigator.serviceWorker.controller
                    ) {
                        console.log("New version ready");

                        // OPTIONAL: silent update activation
                        newWorker.postMessage({ type: 'SKIP_WAITING' });
                    }
                });
            });

            // Reload ONCE after update (prevents loop)
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                refreshing = true;
                window.location.reload();
            });

        } catch (err) {
            console.error('SW ERROR:', err);
        }
    });
}
</script>

<!-- SPLASH HANDLER -->
<script>
window.addEventListener('load', () => {
    const splash = document.getElementById('splash-screen');
    const app = document.getElementById('app');

    setTimeout(() => {
        splash?.classList.add('hide');

        setTimeout(() => {
            splash?.remove();
            if (app) app.style.visibility = 'visible';
        }, 500);

    }, 800); // slightly faster = more professional feel
});
</script>

</body>
    </html>
