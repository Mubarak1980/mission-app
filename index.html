<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mission App</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./styles.css" />

    <!-- PWA -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#2d89ef" />

    <!-- Icons -->
    <link rel="apple-touch-icon" href="./icon-192.png">
</head>

<body>

    <h1>TIME</h1>

    <div class="section-buttons">
        <button onclick="loadSunnahTracker()">Sunnah Tracker</button>

        <!-- ✅ FIX: always use global grade -->
        <button onclick="loadSection('study', window.currentGrade)">Study Tracker</button>

        <button onclick="loadSection('timetable', window.currentGrade)">📅 Weekly Timetable</button>

        <!-- ✅ FIX: unified router -->
        <button onclick="loadSection('dashboard', window.currentGrade)">📊 Dashboard</button>

        <!-- ⚠️ only keep if function exists -->
        <button onclick="loadTopStudentMode()">🎓 Top Student Mode</button>
    </div>

    <div id="grade-progress-bar"></div>
    <div id="main-content"></div>

    <div class="nav-buttons" id="grade-nav">
        <button onclick="previousGrade()" id="prev-btn">Previous</button>
        <button onclick="nextGrade()" id="next-btn">Next</button>
    </div>

    <!-- ===============================
         JS FILES (ORDER MATTERS ⚠️)
         =============================== -->

    <!-- ✅ MUST LOAD FIRST (data source) -->
    <script src="./Study-tracker.js"></script>

    <!-- ✅ DEPENDENT MODULES -->
    <script src="./weekly-timetable.js"></script>
    <script src="./dashboard.js"></script>
    <script src="./top-student-mode.js"></script>
    <script src="./Sunnah-tracker.js"></script>

    <!-- ✅ MAIN CONTROLLER LAST -->
    <script src="./main.js"></script>

    <!-- ===============================
         SERVICE WORKER
         =============================== -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(() => console.log('Service Worker Registered'))
                    .catch(err => console.log('SW Error:', err));
            });
        }
    </script>

    <!-- ===============================
         SAFE STARTUP (NO DOUBLE LOAD)
         =============================== -->
    <script>
        window.addEventListener('DOMContentLoaded', () => {

            // ✅ only run if main.js hasn't already initialized
            if (!window.__appStarted) {
                window.__appStarted = true;

                if (typeof loadSection === 'function') {
                    loadSection('study', window.currentGrade || 9);
                }
            }
        });
    </script>

</body>
</html>
