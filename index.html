<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Mission App</title>

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css" />
    
    <!-- Chrome Extension / PWA Meta -->
    <meta name="theme-color" content="#00d4ff" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>

    <!-- 🌄 SPLASH SCREEN -->
    <div id="splash-screen" role="presentation">
        <div class="splash-content">
            <h1>📘 Mission App</h1>
            <p>Loading your study system...</p>
            <div class="loader"></div>
        </div>
    </div>

    <!-- MAIN APP -->
    <main id="app" style="visibility: hidden;" aria-hidden="true">
        <header>
            <h1>TIME</h1>
        </header>

        <nav class="section-buttons">
            <button type="button" id="btn-sunnah">Sunnah Tracker</button>
            <button type="button" id="btn-study">Study Tracker</button>
            <button type="button" id="btn-timetable">📅 Weekly Timetable</button>
            <button type="button" id="btn-dashboard">📊 Dashboard</button>
            <button type="button" id="btn-top-student">🎓 Top Student Mode</button>
        </nav>

        <section id="content-area">
            <div id="grade-progress-bar"></div>
            <div id="main-content"></div>
        </section>

        <footer class="nav-buttons" id="grade-nav">
            <button type="button" id="prev-btn">Previous</button>
            <button type="button" id="next-btn">Next</button>
        </footer>
    </main>

    <!-- CORE LOGIC FILES -->
    <script src="Sunnah-tracker.js"></script>
    <script src="Study-tracker.js"></script>
    <script src="weekly-timetable.js"></script>
    <script src="dashboard.js"></script>
    <script src="top-student-mode.js"></script>
    <script src="main.js"></script>

    <!-- EXTENSION INITIALIZER (Replacing inline scripts) -->
    <script src="app-init.js"></script>
</body>
</html>
