<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Mission App</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./styles.css" />

    <!-- PWA MANIFEST (must be JSON file) -->
    <link rel="manifest" href="./manifest.json" />

    <meta name="theme-color" content="#00d4ff" />
    <meta name="application-name" content="Mission App">

    <!-- PWA FLAGS -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mission App">

    <!-- ICONS -->
    <link rel="icon" href="./icon-192.png">
    <link rel="apple-touch-icon" href="./icon-192.png">

</head>

<body>

    <!-- SPLASH SCREEN -->
    <div id="splash-screen">
        <div class="splash-content">
            <h1>📘 Mission App</h1>
            <p>Loading...</p>
            <div class="loader"></div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app" style="visibility:hidden;">

        <h1>TIME</h1>

        <!-- INSTALL BUTTON -->
        <button id="install-btn" style="display:none;">Install App</button>

        <div class="section-buttons">
            <button onclick="loadSunnahTracker()">Sunnah Tracker</button>
            <button onclick="loadSection('study', currentGrade)">Study Tracker</button>
            <button onclick="loadSection('timetable', currentGrade)">Weekly Timetable</button>
            <button onclick="loadDashboard()">Dashboard</button>
            <button onclick="loadTopStudentMode()">Top Student Mode</button>
        </div>

        <div id="grade-progress-bar"></div>
        <div id="main-content"></div>

        <div id="grade-nav">
            <button onclick="previousGrade()" id="prev-btn">Previous</button>
            <button onclick="nextGrade()" id="next-btn">Next</button>
        </div>

    </div>

    <!-- JS FILES (defer improves load safety) -->
    <script src="./Sunnah-tracker.js" defer></script>
    <script src="./Study-tracker.js" defer></script>
    <script src="./weekly-timetable.js" defer></script>
    <script src="./dashboard.js" defer></script>
    <script src="./top-student-mode.js" defer></script>
    <script src="./main.js" defer></script>

    <!-- SERVICE WORKER REGISTRATION -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('Service Worker registered:', reg.scope))
                    .catch(err => console.error('Service Worker error:', err));
            });
        }
    </script>

    <!-- SPLASH SCREEN HANDLER -->
    <script>
        window.addEventListener('load', () => {
            const splash = document.getElementById('splash-screen');
            const app = document.getElementById('app');

            setTimeout(() => {
                splash.classList.add('hide');

                setTimeout(() => {
                    splash.remove();
                    app.style.visibility = 'visible';
                }, 500);

            }, 1000);
        });
    </script>

</body>
</html>
